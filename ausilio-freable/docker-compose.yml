version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: nginx_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: airtablesync/nginx:1.0.0
    restart: on-failure
    depends_on:
      - app
      - ai-engine
    ports:
      - "8080:8080"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: airtablesync/nocodb:2026.06.1
    restart: on-failure
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres_1:5432?u=nocodb&p=${DB_PASSWORD:-itworkslocally}&d=nocodb"
      NC_PUBLIC_URL: "${APP_URL:-http://localhost:2184}"
      NC_AUTH_JWT_SECRET: "${JWT_SECRET:-airtablesync-jwt-secret-change-me}"
    volumes:
      - ${APP_DATA_DIR}/data/app:/usr/app/data

  ai-engine:
    image: airtablesync/ai-engine:1.0.0
    restart: on-failure
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    depends_on:
      - app
    environment:
      PORT: 3001
      NODE_ENV: production
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data/ai-engine:/data

  postgres:
    image: postgres:18.3-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: "${DB_PASSWORD:-itworkslocally}"
      PGDATA: /data/pgdata
    healthcheck:
      test: "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data/db:/data
